<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ushra! 🦋</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0d0221, #150535, #1a063a, #0d0221);
    overflow-x: hidden;
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    perspective: 1000px;
  }

  /* ===== STARS BACKGROUND ===== */
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }

  /* ===== FLOATING BUTTERFLIES (CSS) ===== */
  .butterfly-container {
    position: fixed;
    z-index: 1;
    pointer-events: none;
    animation: floatAround var(--floatDur, 12s) ease-in-out infinite;
  }
  .butterfly {
    width: 40px; height: 40px;
    position: relative;
    transform-style: preserve-3d;
    animation: butterflyBob 2s ease-in-out infinite;
  }
  .wing {
    position: absolute;
    width: 20px; height: 30px;
    top: 5px;
    border-radius: 50% 50% 50% 0;
    transform-origin: right center;
    animation: flapLeft 0.3s ease-in-out infinite alternate;
  }
  .wing.left {
    left: 0;
    background: var(--wcolor1, #ff6ec7);
    box-shadow: 0 0 15px var(--wcolor1, #ff6ec7), inset 2px 2px 8px rgba(255,255,255,0.4);
    border-radius: 50% 50% 0 50%;
    transform-origin: right center;
    animation: flapLeft 0.3s ease-in-out infinite alternate;
  }
  .wing.right {
    right: 0;
    background: var(--wcolor2, #7b68ee);
    box-shadow: 0 0 15px var(--wcolor2, #7b68ee), inset -2px 2px 8px rgba(255,255,255,0.4);
    border-radius: 50% 50% 50% 0;
    transform-origin: left center;
    animation: flapRight 0.3s ease-in-out infinite alternate;
  }
  .body-part {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 4px; height: 20px;
    background: #fff;
    border-radius: 2px;
  }
  @keyframes flapLeft { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(60deg); } }
  @keyframes flapRight { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(-60deg); } }
  @keyframes butterflyBob { 0%,100% { transform: translateY(0) rotateZ(-5deg); } 50% { transform: translateY(-10px) rotateZ(5deg); } }

  @keyframes floatAround {
    0%   { transform: translate(0, 0) rotate(0deg); }
    25%  { transform: translate(100px, -80px) rotate(5deg); }
    50%  { transform: translate(-50px, -150px) rotate(-3deg); }
    75%  { transform: translate(-120px, -50px) rotate(4deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

  /* ===== MAIN CONTENT ===== */
  .main-content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
  }

  /* ===== CAKE 3D ===== */
  .cake-scene {
    perspective: 600px;
    margin-bottom: 2rem;
    cursor: pointer;
  }
  .cake-3d {
    width: 160px; height: 180px;
    margin: 0 auto;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateCake 8s ease-in-out infinite;
  }
  @keyframes rotateCake { 0%,100% { transform: rotateY(-15deg) rotateX(5deg); } 50% { transform: rotateY(15deg) rotateX(5deg); } }

  .cake-layer {
    position: absolute;
    left: 50%;
    border-radius: 50%;
    transform: translateX(-50%) rotateX(60deg);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .cake-layer.bottom {
    bottom: 0; width: 140px; height: 50px;
    background: linear-gradient(180deg, #ff6b9d, #c44569);
    border: 3px solid #ff85ad;
  }
  .cake-layer.middle {
    bottom: 40px; width: 110px; height: 45px;
    background: linear-gradient(180deg, #a855f7, #7c3aed);
    border: 3px solid #c084fc;
  }
  .cake-layer.top-layer {
    bottom: 75px; width: 80px; height: 40px;
    background: linear-gradient(180deg, #38bdf8, #0284c7);
    border: 3px solid #7dd3fc;
  }
  .candle {
    position: absolute;
    bottom: 110px; left: 50%; transform: translateX(-50%);
    width: 6px; height: 35px;
    background: linear-gradient(180deg, #fef08a, #facc15);
    border-radius: 2px;
  }
  .flame {
    position: absolute;
    top: -18px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 18px;
    background: radial-gradient(ellipse, #fff 0%, #fbbf24 40%, #f97316 70%, transparent 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 0.4s ease-in-out infinite alternate;
    box-shadow: 0 0 20px #fbbf24, 0 0 40px #f97316, 0 0 60px rgba(249,115,22,0.3);
  }
  @keyframes flicker { 0% { transform: translateX(-50%) scale(1) rotate(-3deg); } 100% { transform: translateX(-50%) scale(1.15) rotate(3deg); } }

  /* Cake decorations - little butterfly shapes */
  .cake-deco {
    position: absolute;
    font-size: 14px;
    animation: decoFloat 3s ease-in-out infinite;
  }
  @keyframes decoFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

  /* ===== TITLE ===== */
  .title-section { margin-bottom: 1.5rem; }

  .happy-text {
    font-family: 'Poppins', sans-serif;
    font-size: 1.2rem;
    font-weight: 300;
    color: #c084fc;
    letter-spacing: 8px;
    text-transform: uppercase;
    animation: fadeInDown 1s ease-out;
    margin-bottom: 0.5rem;
  }
  .name-text {
    font-family: 'Dancing Script', cursive;
    font-size: 4rem;
    background: linear-gradient(135deg, #ff6ec7, #7b68ee, #38bdf8, #ff6ec7);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite, fadeInUp 1s ease-out;
    filter: drop-shadow(0 0 30px rgba(123,104,238,0.4));
    line-height: 1.2;
  }
  @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  @keyframes fadeInDown { 0% { opacity: 0; transform: translateY(-30px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

  .birthday-text {
    font-family: 'Poppins', sans-serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: #fbbf24;
    text-shadow: 0 0 20px rgba(251,191,36,0.5);
    animation: fadeInUp 1.2s ease-out;
    letter-spacing: 3px;
  }

  /* ===== MESSAGE CARD ===== */
  .message-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2rem 2.5rem;
    max-width: 500px;
    margin: 1.5rem auto;
    animation: fadeInUp 1.5s ease-out;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .message-card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 20px 60px rgba(123,104,238,0.3);
  }
  .message-card::before {
    content: '';
    position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(45deg, #ff6ec7, #7b68ee, #38bdf8, #ff6ec7);
    background-size: 400% 400%;
    border-radius: 21px;
    z-index: -1;
    animation: gradientShift 5s ease infinite;
    opacity: 0.5;
  }
  .message-card p {
    color: #e2d9f3;
    font-size: 1rem;
    line-height: 1.8;
    font-weight: 300;
  }
  .message-card .emoji-line {
    font-size: 1.8rem;
    margin-top: 1rem;
  }

  /* ===== WISH BUTTON ===== */
  .wish-btn {
    margin-top: 2rem;
    padding: 15px 40px;
    font-family: 'Poppins', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #a855f7, #6366f1);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    box-shadow: 0 5px 25px rgba(168,85,247,0.4);
    animation: fadeInUp 1.8s ease-out;
  }
  .wish-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 40px rgba(168,85,247,0.6);
  }
  .wish-btn:active { transform: scale(0.95); }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    animation: confettiFall var(--fallDur) ease-in forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.5); }
  }

  /* ===== FLOATING HEARTS/SPARKLES ===== */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    font-size: 1.2rem;
    animation: sparkleFloat 4s ease-in forwards;
  }
  @keyframes sparkleFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-200px) scale(0.3); }
  }

  /* ===== MUSIC NOTE TOGGLE ===== */
  .music-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 45px; height: 45px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.3rem;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .music-toggle:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }

  /* ===== 3D BUTTERFLY SHOWCASE ===== */
  .butterfly-showcase {
    perspective: 800px;
    margin: 2rem auto;
    width: 200px; height: 120px;
    position: relative;
  }
  .showcase-butterfly {
    position: absolute;
    left: 50%; top: 50%;
    transform-style: preserve-3d;
    animation: showcaseSpin 6s linear infinite;
  }
  .showcase-butterfly .s-wing {
    position: absolute;
    width: 50px; height: 70px;
    top: -35px;
    border-radius: 50%;
    box-shadow: inset 0 0 20px rgba(255,255,255,0.3);
  }
  .showcase-butterfly .s-wing.s-left {
    left: -52px;
    background: linear-gradient(135deg, #ff6ec7, #a855f7);
    transform-origin: right center;
    animation: sFlapL 0.5s ease-in-out infinite alternate;
    border-radius: 70% 30% 30% 70%;
  }
  .showcase-butterfly .s-wing.s-right {
    right: -52px;
    background: linear-gradient(135deg, #a855f7, #38bdf8);
    transform-origin: left center;
    animation: sFlapR 0.5s ease-in-out infinite alternate;
    border-radius: 30% 70% 70% 30%;
  }
  .showcase-butterfly .s-body {
    position: absolute;
    left: -3px; top: -25px;
    width: 6px; height: 50px;
    background: linear-gradient(180deg, #fbbf24, #fff);
    border-radius: 3px;
  }
  .showcase-butterfly .s-antenna {
    position: absolute;
    top: -40px;
    width: 2px; height: 20px;
    background: #fff;
    border-radius: 1px;
  }
  .showcase-butterfly .s-antenna.s-al { left: -8px; transform: rotate(-20deg); }
  .showcase-butterfly .s-antenna.s-ar { left: 6px; transform: rotate(20deg); }
  .showcase-butterfly .s-antenna::after {
    content: '';
    position: absolute; top: -4px; left: -2px;
    width: 6px; height: 6px;
    background: #fbbf24;
    border-radius: 50%;
    box-shadow: 0 0 8px #fbbf24;
  }

  @keyframes sFlapL { 0% { transform: rotateY(0deg) rotateZ(5deg); } 100% { transform: rotateY(50deg) rotateZ(-5deg); } }
  @keyframes sFlapR { 0% { transform: rotateY(0deg) rotateZ(-5deg); } 100% { transform: rotateY(-50deg) rotateZ(5deg); } }
  @keyframes showcaseSpin { 0% { transform: translate(-50%,-50%) rotateY(0deg); } 100% { transform: translate(-50%,-50%) rotateY(360deg); } }

  /* ===== TRAIL EFFECT ===== */
  .trail-dot {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    animation: trailFade 1s ease-out forwards;
  }
  @keyframes trailFade { 0% { opacity: 0.8; transform: scale(1); } 100% { opacity: 0; transform: scale(0); } }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .name-text { font-size: 2.8rem; }
    .birthday-text { font-size: 1.3rem; }
    .message-card { margin: 1rem; padding: 1.5rem; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- CSS Butterflies -->
<div class="butterfly-container" style="top:15%; left:10%; --floatDur:14s;">
  <div class="butterfly" style="--wcolor1:#ff6ec7; --wcolor2:#a855f7;">
    <div class="wing left"></div>
    <div class="wing right"></div>
    <div class="body-part"></div>
  </div>
</div>
<div class="butterfly-container" style="top:25%; right:12%; --floatDur:11s;">
  <div class="butterfly" style="--wcolor1:#38bdf8; --wcolor2:#06b6d4;">
    <div class="wing left"></div>
    <div class="wing right"></div>
    <div class="body-part"></div>
  </div>
</div>
<div class="butterfly-container" style="bottom:20%; left:15%; --floatDur:16s;">
  <div class="butterfly" style="--wcolor1:#fbbf24; --wcolor2:#f97316;">
    <div class="wing left"></div>
    <div class="wing right"></div>
    <div class="body-part"></div>
  </div>
</div>
<div class="butterfly-container" style="top:60%; right:8%; --floatDur:13s;">
  <div class="butterfly" style="--wcolor1:#4ade80; --wcolor2:#22d3ee;">
    <div class="wing left"></div>
    <div class="wing right"></div>
    <div class="body-part"></div>
  </div>
</div>
<div class="butterfly-container" style="top:40%; left:5%; --floatDur:18s;">
  <div class="butterfly" style="--wcolor1:#f472b6; --wcolor2:#e879f9;">
    <div class="wing left"></div>
    <div class="wing right"></div>
    <div class="body-part"></div>
  </div>
</div>
<div class="butterfly-container" style="top:10%; left:60%; --floatDur:15s;">
  <div class="butterfly" style="--wcolor1:#fb923c; --wcolor2:#facc15;">
    <div class="wing left"></div>
    <div class="wing right"></div>
    <div class="body-part"></div>
  </div>
</div>

<!-- Music Toggle -->
<div class="music-toggle" id="musicToggle" title="Toggle Music">🔇</div>

<!-- Main Content -->
<div class="main-content">

  <!-- 3D Butterfly Showcase -->
  <div class="butterfly-showcase">
    <div class="showcase-butterfly">
      <div class="s-wing s-left"></div>
      <div class="s-wing s-right"></div>
      <div class="s-body"></div>
      <div class="s-antenna s-al"></div>
      <div class="s-antenna s-ar"></div>
    </div>
  </div>

  <!-- Title -->
  <div class="title-section">
    <p class="happy-text">✨ Happy Birthday ✨</p>
    <h1 class="name-text">Ushra</h1>
    <p class="birthday-text">🎂 Make A Wish! 🎂</p>
  </div>

  <!-- 3D Cake -->
  <div class="cake-scene" id="cakeScene" title="Click for surprise!">
    <div class="cake-3d">
      <div class="cake-layer bottom"></div>
      <div class="cake-layer middle"></div>
      <div class="cake-layer top-layer"></div>
      <div class="candle">
        <div class="flame" id="flame"></div>
      </div>
      <div class="cake-deco" style="bottom:5px; left:10px;">🦋</div>
      <div class="cake-deco" style="bottom:5px; right:10px; animation-delay:0.5s;">🦋</div>
      <div class="cake-deco" style="bottom:45px; left:25px; animation-delay:1s;">✨</div>
      <div class="cake-deco" style="bottom:45px; right:25px; animation-delay:1.5s;">✨</div>
    </div>
  </div>

  <!-- Message Card -->
  <div class="message-card">
    <p>
      🦋 Wishing you a day as beautiful and colorful as the butterflies you love!
      May your new year be filled with magical moments, endless joy, and dreams
      that take flight. You deserve all the happiness in the world! 🌸
    </p>
    <div class="emoji-line">🦋 💜 🎂 💫 🦋</div>
  </div>

  <!-- Wish Button -->
  <button class="wish-btn" id="wishBtn">
    🎉 Send Birthday Magic! 🎉
  </button>
</div>

<script>
  // ===== CREATE STARS =====
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;
    star.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --dur:${Math.random()*3+1}s; animation-delay:${Math.random()*3}s;
    `;
    starsContainer.appendChild(star);
  }

  // ===== CONFETTI BURST =====
  function burstConfetti() {
    const colors = ['#ff6ec7','#7b68ee','#38bdf8','#fbbf24','#4ade80','#f472b6','#fb923c','#a855f7'];
    const shapes = ['●','◆','■','▲','★','🦋'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.textContent = shapes[Math.floor(Math.random()*shapes.length)];
      const dur = Math.random()*2+2;
      el.style.cssText = `
        left:${Math.random()*100}%; top:-20px;
        color:${colors[Math.floor(Math.random()*colors.length)]};
        font-size:${Math.random()*16+8}px;
        --fallDur:${dur}s;
        animation-delay:${Math.random()*0.5}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), (dur+1)*1000);
    }
  }

  // ===== SPARKLE BURST =====
  function sparkles(x, y) {
    const emojis = ['✨','🦋','💜','⭐','🌸','💫'];
    for (let i = 0; i < 12; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      s.style.cssText = `
        left:${x + (Math.random()-0.5)*100}px;
        top:${y}px;
        animation-duration:${Math.random()*2+2}s;
        animation-delay:${Math.random()*0.3}s;
      `;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 4500);
    }
  }

  // ===== WISH BUTTON =====
  document.getElementById('wishBtn').addEventListener('click', function(e) {
    burstConfetti();
    sparkles(e.clientX, e.clientY);
    setTimeout(burstConfetti, 800);
    setTimeout(burstConfetti, 1600);
  });

  // ===== CAKE CLICK =====
  document.getElementById('cakeScene').addEventListener('click', function(e) {
    sparkles(e.clientX, e.clientY);
    burstConfetti();
  });

  // ===== MOUSE TRAIL =====
  const trailColors = ['#ff6ec7','#7b68ee','#38bdf8','#fbbf24','#a855f7'];
  let trailIndex = 0;
  let lastTrail = 0;
  document.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastTrail < 50) return;
    lastTrail = now;
    const dot = document.createElement('div');
    dot.className = 'trail-dot';
    dot.style.cssText = `
      left:${e.clientX-4}px; top:${e.clientY-4}px;
      background:${trailColors[trailIndex%trailColors.length]};
      box-shadow: 0 0 10px ${trailColors[trailIndex%trailColors.length]};
    `;
    trailIndex++;
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 1000);
  });

  // ===== SIMPLE AUDIO (Web Audio API beep melody) =====
  let audioCtx, isPlaying = false;
  const musicToggle = document.getElementById('musicToggle');

  function playBirthdayMelody() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Happy Birthday notes (simplified, in Hz)
    const notes = [
      262,262,294,262,349,330, // Happy birthday to you
      262,262,294,262,392,349, // Happy birthday to you
      262,262,523,440,349,330,294, // Happy birthday dear...
      466,466,440,349,392,349  // Happy birthday to you
    ];
    const durations = [
      0.3,0.3,0.6,0.6,0.6,1,
      0.3,0.3,0.6,0.6,0.6,1,
      0.3,0.3,0.6,0.6,0.6,0.6,1,
      0.3,0.3,0.6,0.6,0.6,1
    ];
    let time = audioCtx.currentTime;
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.1, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + durations[i]);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(time);
      osc.stop(time + durations[i]);
      time += durations[i] * 0.9;
    });
    setTimeout(() => { isPlaying = false; musicToggle.textContent = '🔇'; }, time * 1000);
  }

  musicToggle.addEventListener('click', () => {
    if (!isPlaying) {
      isPlaying = true;
      musicToggle.textContent = '🔊';
      playBirthdayMelody();
    }
  });

  // ===== AUTO CONFETTI ON LOAD =====
